spring.application.name=smart-student-backend

# ─── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/smart_student_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ─── H2 Console ───────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Server ───────────────────────────────────────────────────
server.port=8080

# ─── JWT ──────────────────────────────────────────────────────
# Replace with a strong 256-bit secret in production
jwt.secret=SmartStudentSuperSecretKey2024ChangeThisInProduction
jwt.expiration-ms=86400000

# ─── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
upload.dir=./uploads

# ─── CORS ─────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173

# ─── Logging ──────────────────────────────────────────────────
logging.level.com.smartstudent=DEBUG
logging.level.org.springframework.security=WARN
